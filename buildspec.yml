version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo Installing dependencies...
      - pip install --upgrade pip
      - pip install -r requirements.txt
      - pip install pytest httpx black flake8 isort

  pre_build:
    commands:
      - echo Running format check...
      - black --check .
      - isort --check-only .

      - echo Running lint...
      - flake8 .

  build:
    commands:
      - echo Running tests...
      - pytest -v

artifacts:
  files:
    - '**/*'
